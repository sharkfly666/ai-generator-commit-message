name: Build Plugin

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Build plugin
        run: ./gradlew buildPlugin --stacktrace
      
      - name: Verify plugin build
        run: |
          echo "Checking build output..."
          ls -lh build/distributions/
          PLUGIN_FILE=$(ls build/distributions/*.zip 2>/dev/null | head -n 1)
          if [ -z "$PLUGIN_FILE" ]; then
            echo "Error: Plugin ZIP file not found!"
            exit 1
          fi
          echo "Plugin built successfully: $PLUGIN_FILE"
      
      - name: Run tests
        run: ./gradlew test --stacktrace
      
      - name: Verify plugin
        run: ./gradlew verifyPlugin --stacktrace
      
      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-artifact
          path: build/distributions/*.zip
          retention-days: 30
          if-no-files-found: error

